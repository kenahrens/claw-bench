apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: claw-bench
  labels:
    claw.agent: ${AGENT_NAME}
    claw.task: ${TASK_ID}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: claw-runner
        claw.agent: ${AGENT_NAME}
        claw.task: ${TASK_ID}
    spec:
      restartPolicy: Never
      containers:
        - name: agent
          image: ${AGENT_IMAGE}
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - sh
            - -lc
            - >-
              mkdir -p /tmp/nanoclaw && node -e 'const payload = {
              prompt: process.env.TASK_PROMPT || "",
              groupFolder: process.env.GROUP_FOLDER || "/tmp/nanoclaw",
              chatJid: process.env.CHAT_JID || "claw-bench",
              isMain: true,
              options: {
                pathToClaudeCodeExecutable: process.env.CLAUDE_CODE_PATH || "/app/node_modules/.bin/anthropic-ai-sdk"
              }
              }; if (process.env.SESSION_ID) payload.sessionId = process.env.SESSION_ID;
              process.stdout.write(JSON.stringify(payload));' | /app/entrypoint.sh
          env:
            - name: HOME
              value: /home/node
            - name: TASK_PROMPT
              value: "${TASK_INSTRUCTION}"
            - name: GROUP_FOLDER
              value: /tmp/nanoclaw
            - name: CHAT_JID
              value: "${AGENT_NAME}-${TASK_ID}"
            - name: CLAUDE_CODE_PATH
              value: /app/node_modules/.bin/anthropic-ai-sdk
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: anthropic_api_key
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: llm_api_key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: openai_api_key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: openai_api_key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: anthropic_api_key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: github_token
          resources:
            requests:
              cpu: "${RESOURCE_CPU_REQUEST}"
              memory: "${RESOURCE_MEMORY_REQUEST}"
            limits:
              cpu: "${RESOURCE_CPU_LIMIT}"
              memory: "${RESOURCE_MEMORY_LIMIT}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: ipc
              mountPath: /workspace/ipc
            - name: group
              mountPath: /workspace/group
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/node
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: claw-workspace
        - name: ipc
          emptyDir: {}
        - name: group
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
